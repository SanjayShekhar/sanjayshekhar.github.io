<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sanjay Shekhar</title>
<style>
  :root {
    color-scheme: light dark;
    --fg: #1a1a1a;
    --bg: #ffffff;
    --muted: #6b6b6b;
    --accent: #4f46e5;
    --border: #e5e5e5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --fg: #f0f0f0;
      --bg: #121212;
      --muted: #a0a0a0;
      --border: #2a2a2a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--fg);
    background: var(--bg);
    display: flex;
    justify-content: center;
    padding: 4rem 1.5rem;
  }
  main {
    max-width: 640px;
    width: 100%;
  }
  h1 {
    font-size: 2rem;
    margin-bottom: 0.25rem;
  }
  p.tagline {
    color: var(--muted);
    margin-top: 0;
    margin-bottom: 2.5rem;
  }
  .card {
    display: block;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    text-decoration: none;
    color: inherit;
    margin-bottom: 1rem;
    transition: border-color 0.15s ease;
  }
  .card:hover {
    border-color: var(--accent);
  }
  .card h2 {
    margin: 0 0 0.4rem 0;
    font-size: 1.1rem;
    color: var(--accent);
  }
  .card p {
    margin: 0;
    color: var(--muted);
    font-size: 0.95rem;
  }
  footer {
    margin-top: 3rem;
    color: var(--muted);
    font-size: 0.85rem;
  }
  footer a {
    color: inherit;
  }
</style>
</head>
<body>
<main>
  <h1>Sanjay Shekhar</h1>
  <p class="tagline">Building things, writing some of it down.</p>

  <a class="card" href="https://sanjayshekhar.github.io/agent-tool-search/">
    <h2>Agent Tool Search &rarr;</h2>
    <p>Why binding every tool to an LLM agent overloads its context, and a dynamic
       search-and-cache alternative that doesn't.</p>
  </a>

  <footer>
    <a href="https://github.com/SanjayShekhar">GitHub</a>
  </footer>
</main>
</body>
</html>
